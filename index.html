<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>2026 最新人格測驗｜測出朋友眼中的你</title>

  <meta property="og:title" content="你的隱藏人格測驗">
  <meta property="og:description" content="只要 10 秒，測出你不為人知的真實人格">
  <meta property="og:type" content="website">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f6f3ff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      text-align: center;
    }

    .card {
      width: min(88%, 420px);
      padding: 36px 24px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      line-height: 1.7;
      color: #555;
    }

    button {
      margin-top: 18px;
      padding: 14px 34px;
      border: none;
      border-radius: 999px;
      background: #7257e8;
      color: white;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      display: none;
    }

    #result img {
      width: 100%;
      margin-top: 18px;
      border-radius: 16px;
    }
  </style>
</head>

<body>
  <main class="card">
    <section id="start">
      <h1>你的隱藏人格測驗</h1>

      <p>
        只需回答幾個簡單問題，<br>
        立即分析你最真實的一面。
      </p>

      <button onclick="showResult()">開始測驗</button>
    </section>

    <section id="loading" style="display:none;">
      <h1>正在分析你的人格……</h1>
      <p>比對心理特質與行為模式中</p>
    </section>

    <section id="result">
      <h1>分析完成</h1>
      <p>你的人格類型是：</p>
      <h2>看到連結就會亂點型</h2>

      <img
        src="S__30883874.jpg"
        alt="測驗結果梗圖"
      >
    </section>
  </main>

  <script>
    function showResult() {
      document.getElementById("start").style.display = "none";
      document.getElementById("loading").style.display = "block";

      setTimeout(function () {
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").style.display = "block";
      }, 2500);
    }
  </script>
</body>
</html>
